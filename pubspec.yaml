name: step_race
description: A competitive daily step tracker where you race friends on a shared visual track.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Step counting
  pedometer: ^4.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Local storage
  shared_preferences: ^2.3.2

  # Animations
  confetti: ^0.7.0

  # State management
  provider: ^6.1.2

  # Date formatting
  intl: ^0.19.0

  # UI extras
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
          weight: 400
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
